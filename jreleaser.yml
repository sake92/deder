
project:
  name: deder-cli
  description: Deder Build Tool
  authors:
    - Sakib Hadžiavdić
  links:
    homepage: https://github.com/sake92/deder
  license: Apache-2
  inceptionYear: 2025
  stereotype: CLI
  languages:
    java:
      groupId: ba.sake.deder

release:
  github:
    owner: sake92
    name: deder
    overwrite: true
    changelog:
      formatted: ALWAYS
      preset: conventional-commits
      contributors:
        format: '- {{contributorName}}{{#contributorUsernameAsLink}} ({{.}}){{/contributorUsernameAsLink}}'

distributions:
  deder-server-jar:
    type: SINGLE_JAR
    artifacts:
      - path: deder-server.jar
  deder-client-jar:
    type: SINGLE_JAR
    artifacts:
      - path: deder-client.jar
  deder-client-native:
    type: FLAT_BINARY
    artifacts:
      - path: deder-client-linux-amd64
        platform: linux-x86_64
      - path: deder-client-macos-aarch64
        platform: osx-aarch_64

packagers:
  brew:
    active: ALWAYS
    # same formula for both macOS and Linux
    multiPlatform: true
    repository:
      owner: sake92
      name: homebrew-tap
