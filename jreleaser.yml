
project:
  name: deder-cli
  description: Deder Build Tool
  authors:
    - Sakib Hadžiavdić
  links:
    homepage: https://github.com/sake92/deder
  license: Apache-2
  inceptionYear: 2025
  stereotype: CLI
  languages:
    java:
      groupId: ba.sake.deder

release:
  github:
    owner: sake92
    name: deder
    overwrite: true
    changelog:
      formatted: ALWAYS
      preset: conventional-commits
      contributors:
        format: '- {{contributorName}}{{#contributorUsernameAsLink}} ({{.}}){{/contributorUsernameAsLink}}'

distributions:
  deder-server-jar:
    type: SINGLE_JAR
    artifacts:
      - path: deder-server.jar
  deder-client-jar:
    type: SINGLE_JAR
    artifacts:
      - path: deder-client.jar
  deder-client-native:
    type: FLAT_BINARY
    executable:
      name: deder
    artifacts:
      - path: deder-client-linux-x86_64
        platform: linux-x86_64
      - path: deder-client-osx-aarch_64
        platform: osx-aarch_64
      - path: deder-client-windows-x86_64.zip
        platform: windows-x86_64
    brew:
      active: ALWAYS
      formulaName: deder
    scoop:
      active: ALWAYS
      packageName: deder
  # doesnt work with FLAT_BINARY
   # winget:
   #   active: ALWAYS
   #   package:
   #     identifier: SakibHadziavdic.deder
   #     name: deder

packagers:
  brew:
    active: NEVER
    # same formula for both macOS and Linux
    multiPlatform: true
    repository:
      owner: sake92
      name: homebrew-tap
  scoop:
    active: NEVER
    repository:
      owner: sake92
      name: scoop-bucket
  winget:
    active: NEVER
    repository:
      owner: sake92
      name: winget-app
    package:
      name: deder
    publisher:
      name: Sakib Hadžiavdić
