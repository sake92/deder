
name: Deploy GhPages

on:
  push:
    branches:
      - main
  workflow_run:
    workflows:
      - Release
    branches:
      - main
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    if: >-
      github.repository == 'sake92/deder' &&
      (
        (github.event_name == 'push' && startsWith(github.event.head_commit.message, 'Releasing version') != true) ||
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      )
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0
      - name: Build
        env: 
          FLATMARK_BASE_URL: https://sake92.github.io/deder
        run: |
            FLATMARK_VERSION=0.0.28
            curl -L https://github.com/sake92/flatmark/releases/download/v${FLATMARK_VERSION}/flatmark-1.0.0.pkg -o flatmark.pkg
            sudo installer -verbose -pkg flatmark.pkg -target /
            ./scripts/build-docs.sh
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs/_site
